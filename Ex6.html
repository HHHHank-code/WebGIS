<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>福建省人均GDP历年变化专题地图</title>

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    
    /* 顶部标题 */
    .header {
      height: 60px;
      background: #0079c2;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      padding-left: 20px;
      font-weight: bold;
    }

    /* 布局容器 */
    .container {
      display: flex;
      height: calc(100% - 60px);
    }

    /* 地图占满剩余空间 */
    arcgis-map {
      display: block;
      height: 100%;
      flex: 1;
    }

    /* 右侧底图面板 */
    #basemapContainer {
      width: 280px;
      background: #f7f7f7;
      border-left: 1px solid #ddd;
      padding: 10px;
      overflow-y: auto;
    }

    /* 面板标题 */
    .panel-title {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      margin: 0 0 10px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid #ddd;
    }
  </style>

  <script>
    // 5.0 官方API密钥配置
    var esriConfig = {
      apiKey: "AAPTaD42n91GnFugyw1_ACxh5xQ..ReLe6bVgv_hA_2k2lTiNGn62r5Ms9KREBupZPCTLKW0xjP3U9dZk5tOLR-s__6XgXYFAX18M6rGQKh_kAn-ZRfmRrpsA_SsSmceIemjQhVgkP1j_mnBH5ZLbHp9rmgpONcZYA-Wqff1pu-7u1-dUcmzicovLCoLfBcapubys-S5FOFK1bC8Cvgx5Ba7IZeY5X40NFO0Oguvz006ZMeNKwzwzH-xDHipDF_HSKKdFaoDTn1_ewRPSuY.AT1_oWLWI3ZM"
    };
  </script>

  <!-- ArcGIS 5.0 官方CDN -->
  <script type="module" src="https://js.arcgis.com/5.0/"></script>

</head>

<body>

  <div class="header">福建省人均GDP历年变化专题地图</div>

  <div class="container">
    <!--  ArcGIS 5.0 原生地图组件（本地绝对能加载底图） -->
    <arcgis-map basemap="streets" center="118.2, 26.0" zoom="7">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-scale-bar slot="bottom-left"></arcgis-scale-bar>
      <arcgis-legend slot="bottom-right"></arcgis-legend>
      <arcgis-search slot="top-right"></arcgis-search>
      <arcgis-layer-list slot="top-left"></arcgis-layer-list>
      
      <!-- 你的福建省GDP专题图层 -->
      <arcgis-feature-layer
        url="https://www.geosceneonline.cn/server/rest/services/Hosted/福建人均GDP历年变化_要素/FeatureServer"
        opacity="0.85"
        title="福建人均GDP历年变化"
      ></arcgis-feature-layer>
    </arcgis-map>

    <!-- 右侧底图选择面板 -->
    <div id="basemapContainer">
      <div class="panel-title">底图选择</div>
      <arcgis-basemap-gallery></arcgis-basemap-gallery>
    </div>
  </div>

</body>
</html>
